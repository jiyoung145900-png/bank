<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP 프리미엄 멤버십 발급기</title>
    <!-- 구글 폰트 불러오기 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Noto+Sans+KR:wght@300;400;500;700;900&family=Montserrat:wght@400;800;900&display=swap" rel="stylesheet">
    <!-- 이미지 캡처를 위한 html2canvas 라이브러리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            /* 전체 배경: 깊이감 있는 럭셔리 다크룸 */
            --bg-color: radial-gradient(circle at 50% 0%, #2a2a35 0%, #121212 70%);
            /* 카드 메인 컬러: 고급스러운 로즈골드 메탈릭 */
            --card-gradient: linear-gradient(135deg, #e0a9a9 0%, #c45b5b 25%, #e28181 50%, #b84545 75%, #e0a9a9 100%);
            /* 샴페인 골드 디테일 */
            --gold-gradient: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            --gold-color: #d4af37;
            --text-dark: #2c1616;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 60px;
            flex-wrap: wrap;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* ---------------- 컨트롤 패널 디자인 ---------------- */
        .controls {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 35px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,1);
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .controls h2 {
            margin: 0;
            font-size: 24px;
            font-weight: 900;
            color: #1a1a1a;
            position: relative;
            padding-bottom: 12px;
            letter-spacing: -0.5px;
        }
        .controls h2::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 40px; height: 4px;
            background: var(--card-gradient);
            border-radius: 2px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 13px;
            font-weight: 700;
            color: #555;
            letter-spacing: -0.3px;
        }

        .input-group input[type="text"] {
            padding: 14px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s;
            background-color: #fafafa;
        }

        .input-group input[type="text"]:focus {
            border-color: #c45b5b;
            outline: none;
            box-shadow: 0 0 0 3px rgba(196, 91, 91, 0.15);
            background-color: #fff;
        }

        /* 커스텀 파일 업로드 버튼 */
        .file-upload-wrapper {
            display: flex;
            gap: 10px;
        }
        .file-btn {
            flex: 1;
            padding: 12px;
            background: #f0f0f0;
            border: 1.5px dashed #ccc;
            border-radius: 10px;
            text-align: center;
            font-size: 13px;
            font-weight: 700;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }
        .file-btn:hover {
            background: #ffebeb;
            border-color: #c45b5b;
            color: #c45b5b;
        }
        input[type="file"] { display: none; }

        /* 커스텀 슬라이더 */
        .slider-group {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #f8f8f8;
            padding: 10px 15px;
            border-radius: 10px;
        }
        
        .slider-group input[type="range"] {
            flex-grow: 1;
            -webkit-appearance: none;
            height: 6px;
            background: #ddd;
            border-radius: 3px;
            outline: none;
        }
        .slider-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px; height: 18px;
            background: #c45b5b;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .slider-value {
            font-size: 13px;
            font-weight: 700;
            color: #c45b5b;
            min-width: 40px;
            text-align: right;
        }

        .controls-divider {
            height: 1px;
            background-color: #eee;
            margin: 5px 0;
        }

        button.download-btn {
            background: var(--card-gradient);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 8px 20px rgba(184, 69, 69, 0.4);
            letter-spacing: -0.5px;
        }

        button.download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(184, 69, 69, 0.5);
        }

        /* ---------------- 카드 프리뷰 영역 ---------------- */
        .card-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            position: sticky;
            top: 40px;
        }

        .save-notice {
            color: #bbb;
            font-size: 14px;
            font-weight: 400;
            background: rgba(0,0,0,0.4);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        /* 실제 멤버십 카드 (하이엔드 퀄리티) */
        .card {
            width: 800px;
            height: 480px;
            background: var(--card-gradient);
            position: relative;
            color: white;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,255,0.4);
            border-radius: 24px;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* 카드 표면 메탈릭 반사광 (홀로그램 느낌) */
        .card-shine {
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            z-index: 1;
            pointer-events: none;
        }

        /* 카드 내부 테두리 */
        .card::before {
            content: '';
            position: absolute;
            top: 12px; left: 12px; right: 12px; bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            pointer-events: none;
            z-index: 1;
        }

        /* 스마트 IC 칩 & NFC 아이콘 */
        .ic-chip {
            position: absolute;
            top: 60px; left: 55px;
            width: 55px; height: 42px;
            background: linear-gradient(135deg, #e8d087, #b88a35);
            border-radius: 6px;
            z-index: 2;
            box-shadow: inset 1px 1px 3px rgba(255,255,255,0.5), 1px 2px 4px rgba(0,0,0,0.2);
            /* IC칩 내부 라인 디자인 */
            background-image: 
                linear-gradient(rgba(0,0,0,0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.2) 1px, transparent 1px);
            background-size: 15px 100%, 100% 12px;
            background-position: center;
        }
        .nfc-icon {
            position: absolute;
            top: 65px; left: 130px;
            width: 30px; height: 30px;
            z-index: 2;
            opacity: 0.8;
        }

        /* 텍스트 공통 */
        .card p { margin: 0; z-index: 2; position: relative; }

        /* 좌측 상단 텍스트 */
        .top-left-text {
            position: absolute;
            top: 120px; left: 55px;
            font-style: normal;
            font-weight: 300;
            font-size: 20px;
            line-height: 1.5;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            letter-spacing: 0.5px;
        }
        .top-left-text strong {
            font-weight: 700;
            color: #fff9e6;
        }

        /* 우측 상단 텍스트 */
        .top-right {
            position: absolute;
            top: 55px; right: 55px;
            text-align: right;
            z-index: 2;
        }
        .top-right .small-text {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.9);
            text-transform: uppercase;
        }
        .top-right .big-eng {
            font-family: 'Montserrat', sans-serif;
            font-size: 46px;
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: 2px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(2px 3px 3px rgba(0,0,0,0.3));
        }
        .top-right .cursive {
            font-family: 'Caveat', cursive;
            font-size: 38px;
            color: #fff;
            -webkit-text-fill-color: #fff;
            margin-top: -10px;
            margin-right: -10px;
            position: relative;
            z-index: 2;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.4);
        }

        /* 중앙 로고 영역 */
        .center-logo {
            position: absolute;
            top: 52%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 80%;
            z-index: 2;
        }
        .center-logo img {
            max-height: 130px;
            max-width: 100%;
            object-fit: contain;
            display: none; 
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
        }
        .center-logo .default-text {
            font-family: 'Caveat', cursive;
            font-size: 100px;
            color: rgba(255, 255, 255, 0.15); /* 배경에 은은하게 녹아들도록 */
            text-shadow: 
                -1px -1px 1px rgba(255,255,255,0.2), 
                1px 1px 1px rgba(0,0,0,0.3); /* 음각(Deboss) 효과 */
            font-weight: 700;
            letter-spacing: 2px;
        }

        /* 좌측 하단 프로필 영역 */
        .profile-area {
            position: absolute;
            bottom: 40px; left: 55px;
            z-index: 3;
            display: flex;
            align-items: flex-end;
            gap: 20px;
        }
        .profile-img-box {
            width: 130px; height: 130px;
            border-radius: 50%;
            background: var(--gold-gradient);
            padding: 4px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.4);
            position: relative;
        }
        /* 입체감을 위한 이너 섀도우 */
        .profile-inner {
            width: 100%; height: 100%;
            border-radius: 50%;
            overflow: hidden;
            background-color: #222;
            position: relative;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.5); 
        }
        .profile-inner img {
            position: absolute;
            top: 50%; left: 50%;
            width: 100%; height: 100%;
            object-fit: cover;
            /* 중심(50%,50%) 기준으로 확대/이동되도록 CSS 변수 사용 */
            transform: translate(calc(-50% + var(--x, 0%)), calc(-50% + var(--y, 0%))) scale(var(--scale, 1));
            transform-origin: center;
        }
        .crown {
            position: absolute;
            top: -20px; left: 50%;
            transform: translateX(-50%) rotate(15deg);
            font-size: 40px;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.4));
            z-index: 4;
        }

        /* 사용자 인포 텍스트 */
        .user-info {
            padding-bottom: 15px;
            text-shadow: 1px 2px 3px rgba(0,0,0,0.3);
        }
        .user-info .label {
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 2px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .user-info .value {
            font-family: 'Montserrat', sans-serif;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 2px;
        }

        /* 우측 하단 QR 및 웹사이트 영역 */
        .qr-area {
            position: absolute;
            bottom: 40px; right: 55px;
            z-index: 2;
            display: flex;
            align-items: flex-end;
            gap: 20px;
        }
        .website-info {
            text-align: right;
            padding-bottom: 5px;
        }
        .website-info p {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
            opacity: 0.8;
        }
        .qr-area img {
            width: 90px; height: 90px;
            background: white;
            padding: 6px;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            object-fit: contain;
        }

    </style>
</head>
<body>

    <!-- 컨트롤 패널 -->
    <div class="controls">
        <h2>프리미엄 설정</h2>
        
        <div class="input-group">
            <label>담당 코디 번호</label>
            <input type="text" id="coord-input" value="10005" placeholder="예: 10005">
        </div>

        <div class="input-group">
            <label>회원 ID</label>
            <input type="text" id="member-input" value="kimcg12345" placeholder="예: kimcg12345">
        </div>

        <div class="controls-divider"></div>

        <div class="input-group">
            <label>프로필 및 QR 등록</label>
            <div class="file-upload-wrapper">
                <label for="profile-upload" class="file-btn">📸 프로필 사진</label>
                <input type="file" id="profile-upload" accept="image/*">
                
                <label for="qr-upload" class="file-btn">🔳 QR 코드</label>
                <input type="file" id="qr-upload" accept="image/*">
            </div>
        </div>

        <!-- 사진 세부 조정 슬라이더 -->
        <div class="input-group" style="margin-top: 10px;">
            <label>프로필 확대/축소</label>
            <div class="slider-group">
                <input type="range" id="profile-scale" min="1" max="3" step="0.05" value="1">
                <span class="slider-value" id="val-scale">1.00</span>
            </div>
        </div>
        <div class="input-group">
            <label>상하(Y) 이동</label>
            <div class="slider-group">
                <input type="range" id="profile-y" min="-50" max="50" step="1" value="0">
                <span class="slider-value" id="val-y">0</span>
            </div>
        </div>
        <div class="input-group">
            <label>좌우(X) 이동</label>
            <div class="slider-group">
                <input type="range" id="profile-x" min="-50" max="50" step="1" value="0">
                <span class="slider-value" id="val-x">0</span>
            </div>
        </div>

        <div class="controls-divider"></div>

        <div class="input-group">
            <label>중앙 로고 커스텀 (선택사항, 배경투명 권장)</label>
            <label for="logo-upload" class="file-btn" style="width:100%; box-sizing:border-box;">🌟 브랜드 로고 업로드</label>
            <input type="file" id="logo-upload" accept="image/*">
        </div>

        <button class="download-btn" onclick="downloadCard()">최고 화질로 멤버십 발급하기</button>
    </div>

    <!-- 카드 미리보기 영역 -->
    <div class="card-wrapper">
        <div class="save-notice">🟢 입력하신 정보는 브라우저에 실시간 자동 저장됩니다.</div>
        
        <!-- 카드 캔버스 -->
        <div class="card" id="card-canvas">
            <div class="card-shine"></div>
            
            <!-- 스마트 IC 칩 & NFC 마크 -->
            <div class="ic-chip"></div>
            <svg class="nfc-icon" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2C7.03 2 3 6.03 3 11v2c0 4.97 4.03 9 9 9s9-4.03 9-9v-2c0-4.97-4.03-9-9-9zM8.5 15.5c-1.1-1.1-1.1-2.9 0-4s2.9-1.1 4 0c.5.5.8 1.2.8 1.9M11.5 18.5c-2.8-2.8-2.8-7.2 0-10s7.2-2.8 10 0"></path>
            </svg>

            <!-- 텍스트 영역 -->
            <div class="top-left-text">
                <p>설레이는 <strong>첫 만남,</strong></p>
                <p>최고의 인연을 선사합니다.</p>
            </div>

            <div class="top-right">
                <p class="small-text">Premium Blind Date</p>
                <p class="big-eng">MEMBER</p>
                <p class="big-eng">SHIP <span class="cursive">for you</span></p>
            </div>

            <div class="center-logo">
                <p class="default-text" id="default-logo-text">banada love</p>
                <img id="card-logo" src="" alt="custom-logo">
            </div>

            <!-- 하단 좌측: 프로필 및 유저정보 -->
            <div class="profile-area">
                <div class="profile-img-box">
                    <div class="crown">👑</div>
                    <div class="profile-inner">
                        <img id="card-profile" src="https://via.placeholder.com/300/333333/ffffff?text=Photo" alt="Profile">
                    </div>
                </div>
                <div class="user-info">
                    <p class="label">COORDINATOR</p>
                    <p class="value" id="val-coord">10005</p>
                    <div style="height:10px;"></div>
                    <p class="label">MEMBER ID</p>
                    <p class="value" id="val-member">kimcg12345</p>
                </div>
            </div>

            <!-- 하단 우측: QR 및 웹사이트 -->
            <div class="qr-area">
                <div class="website-info">
                    <p>BANADALOVE.COM</p>
                </div>
                <img id="card-qr" src="https://via.placeholder.com/150/ffffff/000000?text=QR" alt="QR Code">
            </div>
        </div>
    </div>

    <script>
        // DOM 요소 캐싱
        const coordInput = document.getElementById('coord-input');
        const memberInput = document.getElementById('member-input');
        const valCoord = document.getElementById('val-coord');
        const valMember = document.getElementById('val-member');
        
        const scaleInput = document.getElementById('profile-scale');
        const xInput = document.getElementById('profile-x');
        const yInput = document.getElementById('profile-y');
        const profileImg = document.getElementById('card-profile');
        
        const qrImg = document.getElementById('card-qr');
        const logoImg = document.getElementById('card-logo');
        const defaultLogoText = document.getElementById('default-logo-text');

        const STORAGE_KEY = 'banada_vip_card_data';

        // 1. 텍스트 실시간 반영
        function updateText() {
            valCoord.innerText = coordInput.value;
            valMember.innerText = memberInput.value;
            saveState();
        }
        coordInput.addEventListener('input', updateText);
        memberInput.addEventListener('input', updateText);

        // 2. 사진 위치/크기 조절 (CSS 변수로 주입하여 안전하게 변환)
        function updateProfileTransform() {
            const scale = scaleInput.value;
            const x = xInput.value;
            const y = yInput.value;
            
            // 이미지 자체에 CSS 변수 할당 (잘림 현상 방지)
            profileImg.style.setProperty('--scale', scale);
            profileImg.style.setProperty('--x', `${x}%`);
            profileImg.style.setProperty('--y', `${y}%`);
            
            document.getElementById('val-scale').innerText = parseFloat(scale).toFixed(2);
            document.getElementById('val-x').innerText = x;
            document.getElementById('val-y').innerText = y;
            
            saveState();
        }
        scaleInput.addEventListener('input', updateProfileTransform);
        xInput.addEventListener('input', updateProfileTransform);
        yInput.addEventListener('input', updateProfileTransform);

        // 3. 이미지 업로드 처리
        function handleImageUpload(inputId, targetImgEl, isLogo = false, storageImgKey) {
            const fileInput = document.getElementById(inputId);
            fileInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const base64Str = event.target.result;
                        targetImgEl.src = base64Str;
                        
                        if(isLogo) {
                            targetImgEl.style.display = 'block';
                            defaultLogoText.style.display = 'none';
                        }
                        
                        try {
                            const data = getSavedState();
                            data[storageImgKey] = base64Str;
                            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                        } catch (err) {
                            console.warn("용량 문제로 로컬스토리지에 저장되지 않았습니다.");
                        }
                    }
                    reader.readAsDataURL(file);
                }
            });
        }
        handleImageUpload('profile-upload', profileImg, false, 'profileImgData');
        handleImageUpload('qr-upload', qrImg, false, 'qrImgData');
        handleImageUpload('logo-upload', logoImg, true, 'logoImgData');

        // 4. 상태 저장/불러오기
        function getSavedState() {
            const saved = localStorage.getItem(STORAGE_KEY);
            return saved ? JSON.parse(saved) : {};
        }

        function saveState() {
            const data = getSavedState();
            data.coord = coordInput.value;
            data.member = memberInput.value;
            data.scale = scaleInput.value;
            data.x = xInput.value;
            data.y = yInput.value;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function loadState() {
            const data = getSavedState();
            
            if(data.coord) {
                coordInput.value = data.coord;
                valCoord.innerText = data.coord;
            }
            if(data.member) {
                memberInput.value = data.member;
                valMember.innerText = data.member;
            }
            
            if(data.scale) scaleInput.value = data.scale;
            if(data.x) xInput.value = data.x;
            if(data.y) yInput.value = data.y;
            updateProfileTransform();

            if(data.profileImgData) profileImg.src = data.profileImgData;
            if(data.qrImgData) qrImg.src = data.qrImgData;
            if(data.logoImgData) {
                logoImg.src = data.logoImgData;
                logoImg.style.display = 'block';
                defaultLogoText.style.display = 'none';
            }
        }

        window.onload = loadState;

        // 5. 캡처 시 애니메이션 효과(홀로그램 빛) 임시 제거 후 다운로드
        function downloadCard() {
            const card = document.getElementById('card-canvas');
            const shine = document.querySelector('.card-shine');
            const btn = document.querySelector('.download-btn');
            
            // 버튼 상태 변경
            btn.innerText = "카드 생성 중...";
            btn.style.opacity = '0.7';
            btn.disabled = true;

            // 캡처 호환성을 위해 빛 효과 임시 제거
            shine.style.display = 'none';
            
            // 화질 상승을 위해 scale 값을 3~4로 설정 (높을수록 초고화질)
            html2canvas(card, {
                scale: 3, 
                useCORS: true,
                backgroundColor: null,
                logging: false
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `VIP_CARD_${memberInput.value}.png`;
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
                
                // 원상복구
                shine.style.display = 'block';
                btn.innerText = "최고 화질로 멤버십 발급하기";
                btn.style.opacity = '1';
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
